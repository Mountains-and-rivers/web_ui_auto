[pytest]
# pytest 配置文件

# 禁用 stdout/stderr 捕获，避免与 loguru 冲突
addopts = -v --tb=short --capture=no

# 测试路径和命名规则
test_paths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    smoke: 冒烟测试
    critical: 关键路径
    api: 接口测试
    ui: UI 测试

# 日志设置
log_cli = true
log_cli_level = INFO
log_file = logs/pytest.log
log_file_level = DEBUG
