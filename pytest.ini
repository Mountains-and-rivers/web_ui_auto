[pytest]
# pytest 配置文件

# 禁用 stdout/stderr 捕获，避免与 loguru 冲突
# 默认使用 chromium 浏览器，有头模式
addopts = -v --tb=short --capture=no -p pytest_playwright --browser chromium --headed

# 测试路径和命名规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    smoke: 冒烟测试
    critical: 关键路径
    api: 接口测试
    ui: UI 测试

# 添加 src 到 Python 路径
pythonpath = src
